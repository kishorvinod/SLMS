<section class="page">
  <header class="page-header">
    <div>
      <h1 class="page-title">Captain Dashboard</h1>
      <p class="page-subtitle">Your current shipment workload.</p>
    </div>
  </header>

  @if (loading) {
    <div class="loading-state"><mat-spinner diameter="36" /></div>
  } @else {
    <mat-card class="metric-card">
      <mat-card-header>
        <mat-card-title>Assigned Shipments</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <strong>{{ assignedShipments }}</strong>
      </mat-card-content>
    </mat-card>
  }
</section>
