<section class="page">
  <header class="page-header">
    <div>
      <h1 class="page-title">Admin Dashboard</h1>
      <p class="page-subtitle">Overview of fleet, cargo, and shipment activity.</p>
    </div>
  </header>

  @if (loading) {
    <div class="loading-state">
      <mat-spinner diameter="36" />
    </div>
  } @else {
    <div class="metric-grid">
      <mat-card>
        <mat-card-header>
          <mat-card-title>Total Ships</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <strong>{{ totalShips }}</strong>
        </mat-card-content>
      </mat-card>

      <mat-card>
        <mat-card-header>
          <mat-card-title>Total Cargo</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <strong>{{ totalCargo }}</strong>
        </mat-card-content>
      </mat-card>

      <mat-card>
        <mat-card-header>
          <mat-card-title>Total Shipments</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <strong>{{ totalShipments }}</strong>
        </mat-card-content>
      </mat-card>
    </div>
  }
</section>
